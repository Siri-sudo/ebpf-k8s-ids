
#--------------------------------------------------
#   Simplified Snort.conf for TCP Port Scan Detection
#--------------------------------------------------

###################################################
# Step #1: Set the network variables.
###################################################

# Setup the network addresses you are protecting
ipvar HOME_NET 10.244.0.0/16

# Set up the external network addresses
ipvar EXTERNAL_NET !$HOME_NET

# List of ports you want to monitor for port scans
#portvar SHELLCODE_PORTS !80

# Path to your rules files
var RULE_PATH /etc/snort/rules
var SO_RULE_PATH /etc/snort/so_rules
var PREPROC_RULE_PATH /etc/snort/preproc_rules

# Configure default paths for white and blacklists
var WHITE_LIST_PATH /etc/snort/rules
var BLACK_LIST_PATH /etc/snort/rules

###################################################
# Step #2: Configure the decoder.
###################################################

# Stop generic decode events:
config disable_decode_alerts

# Stop Alerts on invalid IP options
config disable_ipopt_alerts

# Configure IP / TCP checksum mode
config checksum_mode: all

###################################################
# Step #3: Configure the base detection engine.
###################################################

# Configure PCRE match limitations
config pcre_match_limit: 3500
config pcre_match_limit_recursion: 1500

# Configure the detection engine
# config detection: search-method ac-split search-optimize max-pattern-len 20

###################################################
# Step #4: Configure dynamic loaded libraries.
###################################################

# Dynamic preprocessor libraries
dynamicpreprocessor directory /usr/lib/snort/snort_dynamicpreprocessor/

# Base preprocessor engine
dynamicengine /usr/lib/snort/snort_dynamicengine/libsf_engine.so

# Dynamic rules libraries
dynamicdetection directory /usr/lib/snort/snort_dynamicrules

###################################################
# Step #5: Configure preprocessors
###################################################

# Target-Based stateful inspection/stream reassembly
preprocessor stream5_global: track_tcp yes, track_udp no
preprocessor stream5_tcp: policy windows, detect_anomalies, require_3whs 180, \
   overlap_limit 10, small_segments 3 bytes 150, timeout 180

# Portscan detection (main focus)
preprocessor sfportscan: proto { all } memcap { 10000000 } sense_level { low }

###################################################
# Step #6: Configure output plugins
###################################################

# Unified2 output (recommended for most installs)
output unified2: filename snort.log, limit 128, nostamp, mpls_event_types, vlan_event_types

# Fast alert logging
output alert_fast: snort.alert.fast

# Metadata reference data (do not modify these lines)
include classification.config
include reference.config

###################################################
# Step #7: Customize your rule set
###################################################

# Include your specific rules for TCP port scan detection
include $RULE_PATH/local.rules

###################################################
# Step #8: Customize your preprocessor and decoder alerts
###################################################

# Include additional rules if necessary (disabled by default)
# include $PREPROC_RULE_PATH/preprocessor.rules
# include $PREPROC_RULE_PATH/decoder.rules
